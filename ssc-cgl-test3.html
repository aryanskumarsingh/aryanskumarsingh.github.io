function init(){
  makePanel();
  loadQ();
  startTimer();
}

function makePanel(){
  let html = '';
  for(let i = 0; i < questions.length; i++){
    html += `<button class="q-btn" id="btn${i}" onclick="goQ(${i})">${i+1}</button>`;
  }
  document.getElementById('qPanel').innerHTML = html;
}

function loadQ(){
  document.getElementById('qNum').innerText = `Question ${current+1} / ${questions.length} | ${questions[current].s}`;
  document.getElementById('question').innerHTML = questions[current].q;
  
  let optHtml = '';
  questions[current].o.forEach((opt, i) => {
    let checked = answers[current] === i ? 'checked' : '';
    optHtml += `<label><input type="radio" name="opt" value="${i}" ${checked} onchange="saveAns()"> ${opt}</label>`;
  });
  document.getElementById('options').innerHTML = optHtml;
  updatePanel();
}

function saveAns(){
  let selected = document.querySelector('input[name="opt"]:checked');
  if(selected){
    answers[current] = parseInt(selected.value);
  }
  updatePanel();
}

function markReview(){
  marked[current] = !marked[current];
  updatePanel();
}

function nextQ(){
  if(current < questions.length - 1){
    current++;
    loadQ();
  }
}

function goQ(i){
  current = i;
  loadQ();
}

function updatePanel(){
  for(let i = 0; i < questions.length; i++){
    let btn = document.getElementById('btn' + i);
    btn.className = 'q-btn';
    if(i === current) btn.classList.add('current');
    if(marked[i]) btn.classList.add('review');
    else if(answers[i] !== null) btn.classList.add('answered');
    else btn.classList.add('not-visited');
  }
}

function startTimer(){
  timer = setInterval(() => {
    time--;
    let m = Math.floor(time / 60), s = time % 60;
    document.getElementById('timer').innerText = `Time Left: ${m}:${s < 10 ? '0' : ''}${s}`;
    if(time <= 0) {
      clearInterval(timer);
      submitTest();
    }
  }, 1000);
}

function submitTest(){
  clearInterval(timer);
  document.getElementById('quizArea').classList.add('hide');
  document.getElementById('result').classList.remove('hide');
  
  let score = 0, correct = 0, wrong = 0, unattempted = 0;
  let secScore = {GK: 0, Quant: 0, Reasoning: 0, English: 0};
  let solHTML = '';
  
  questions.forEach((q, i) => {
    if(answers[i] === null){
      unattempted++;
      solHTML += `<div class="sol-que not-att"><b>Q${i+1}.</b> ${q.q}<br><b>Not Attempted</b> | Correct: ${q.o[q.a]}</div>`;
    } else if(answers[i] === q.a){
      score += 2;
      correct++;
      secScore[q.s] += 2;
      solHTML += `<div class="sol-que correct"><b>Q${i+1}.</b> ${q.q}<br>Your: ${q.o[answers[i]]} ✔️ | Correct: ${q.o[q.a]}</div>`;
    } else {
      score -= 0.5;
      wrong++;
      secScore[q.s] -= 0.5;
      solHTML += `<div class="sol-que wrong"><b>Q${i+1}.</b> ${q.q}<br>Your: ${q.o[answers[i]]} ❌ | Correct: ${q.o[q.a]}</div>`;
    }
  });
  
  let percentage = ((score / 200) * 100).toFixed(2);
  document.getElementById('finalScore').innerText = `${score}/200`;
  document.getElementById('analysis').innerHTML = `Correct: ${correct} | Wrong: ${wrong} | Unattempted: ${unattempted} | <b>Percentage: ${percentage}%</b>`;
  document.getElementById('sectionScore').innerHTML = `GK: ${secScore.GK}/50 | Quant: ${secScore.Quant}/50 | Reasoning: ${secScore.Reasoning}/50 | English: ${secScore.English}/50`;
  document.getElementById('solutionBox').innerHTML = solHTML;
}

function toggleSolution(){
  document.getElementById('solutionBox').classList.toggle('hide');
}

init();
</script>
