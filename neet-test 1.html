<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NEET Mock Test 1</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f7fb;
}

header{
background:#005aa7;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
display:flex;
height:calc(100vh - 70px);
}

.palette{
width:25%;
background:#eef2f7;
padding:10px;
overflow-y:auto;
}

.question-panel{
width:75%;
padding:20px;
background:white;
overflow-y:auto;
}

.qbtn{
width:45px;
height:45px;
margin:4px;
border:none;
font-weight:bold;
cursor:pointer;
}

.notVisited{
background:#cfcfcf;
}

.notAnswered{
background:#d93025;
color:white;
}

.answered{
background:#34a853;
color:white;
}

.review{
background:#8e24aa;
color:white;
}

.current{
outline:3px solid orange;
}

.option{
padding:10px;
margin:10px 0;
border:1px solid #ddd;
border-radius:5px;
}

button{
padding:10px 20px;
margin:5px;
cursor:pointer;
}

.solution{
background:#e8f5e9;
padding:10px;
margin-top:10px;
border-left:5px solid green;
}

.correct{
color:green;
font-weight:bold;
}

.wrong{
color:red;
font-weight:bold;
}
</style>

</head>

<body>

<header>
<h2>NEET Mock Test 1</h2>
<div id="timer">03:20:00</div>
</header>

<div class="container">

<div class="palette" id="palette"></div>

<div class="question-panel">

<h3 id="subject"></h3>

<div id="question"></div>

<div id="options"></div>

<div>
<button onclick="previousQuestion()">Previous</button>
<button onclick="markReview()">Mark Review</button>
<button onclick="saveNext()">Save & Next</button>
<button onclick="submitTest()">Submit</button>
</div>

</div>

</div>

<script>

const questions = [

{
id:1,
subject:"Physics",
question:"SI unit of force is?",
options:["Joule","Newton","Pascal","Watt"],
answer:1,
solution:"Force is measured in Newton (N)."
},

{
id:2,
subject:"Physics",
question:"Speed of light in vacuum is?",
options:[
"3×10^8 m/s",
"3×10^6 m/s",
"3×10^5 km/s",
"300 m/s"
],
answer:0,
solution:"Speed of light = 3 × 10^8 m/s."
},

{
id:3,
subject:"Chemistry",
question:"Atomic number of Carbon?",
options:["12","6","14","8"],
answer:1,
solution:"Carbon has 6 protons."
},

{
id:4,
subject:"Chemistry",
question:"pH of pure water?",
options:["5","6","7","8"],
answer:2,
solution:"Pure water has pH 7."
},

{
id:5,
subject:"Biology",
question:"Powerhouse of cell?",
options:[
"Nucleus",
"Mitochondria",
"Golgi body",
"Ribosome"
],
answer:1,
solution:"Mitochondria generate ATP."
},

{
id:6,
subject:"Biology",
question:"DNA stands for?",
options:[
"Deoxyribonucleic Acid",
"Ribonucleic Acid",
"Deoxy Acid",
"None"
],
answer:0,
solution:"DNA = Deoxyribonucleic Acid."
}

];

let current=0;
let answers={};
let reviews={};

function createPalette(){

let html="";

for(let i=0;i<questions.length;i++){

html+=`
<button
id="q${i}"
class="qbtn notVisited"
onclick="jump(${i})">
${i+1}
</button>
`;
}

document.getElementById("palette").innerHTML=html;
}

function loadQuestion(){

let q=questions[current];

document.getElementById("subject").innerHTML=
q.subject;

document.getElementById("question").innerHTML=
`<h3>Q${current+1}. ${q.question}</h3>`;

let html="";

q.options.forEach((opt,index)=>{

html+=`
<div class="option">
<label>
<input type="radio"
name="option"
value="${index}"
${answers[q.id]==index?"checked":""}>
${opt}
</label>
</div>
`;
});

document.getElementById("options").innerHTML=html;

document.querySelectorAll(".qbtn")
.forEach(btn=>btn.classList.remove("current"));

document.getElementById(
"q"+current
).classList.add("current");
}

function saveCurrent(){

let selected=
document.querySelector(
'input[name="option"]:checked'
);

if(selected){

answers[
questions[current].id
]=parseInt(selected.value);

document.getElementById(
"q"+current
).className="qbtn answered";
}
else{

document.getElementById(
"q"+current
).className="qbtn notAnswered";
}
}

function saveNext(){

saveCurrent();

if(current<questions.length-1){

current++;
loadQuestion();
}
}

function previousQuestion(){

saveCurrent();

if(current>0){

current--;
loadQuestion();
}
}

function jump(i){

saveCurrent();

current=i;

loadQuestion();
}

function markReview(){

reviews[current]=true;

document.getElementById(
"q"+current
).className="qbtn review";
}

function startTimer(){

let time=12000;

let timer=setInterval(()=>{

time--;

let h=Math.floor(time/3600);
let m=Math.floor((time%3600)/60);
let s=time%60;

document.getElementById(
"timer"
).innerHTML=
`${String(h).padStart(2,'0')}:`+
`${String(m).padStart(2,'0')}:`+
`${String(s).padStart(2,'0')}`;

if(time<=0){

clearInterval(timer);

submitTest();
}

},1000);
}

function submitTest(){

saveCurrent();

let score=0;

let resultHTML=`
<h1>NEET Result</h1>
`;

questions.forEach((q,index)=>{

let user=answers[q.id];

let correct=
user===q.answer;

if(user!==undefined){

if(correct)
score+=4;
else
score-=1;
}

resultHTML+=`

<div style="
background:white;
padding:15px;
margin:15px;
border:1px solid #ddd;">

<h3>Q${index+1}. ${q.question}</h3>

<p>
Your Answer:
${
user!==undefined
?q.options[user]
:"Not Attempted"
}
</p>

<p>
Correct Answer:
${q.options[q.answer]}
</p>

<p class="${
correct
?'correct'
:'wrong'
}">
${
correct
?'Correct'
:'Wrong'
}
</p>

<div class="solution">
${q.solution}
</div>

</div>
`;
});

document.body.innerHTML=`

<div style="padding:20px">

<h1>Test Submitted</h1>

<h2>Score: ${score}</h2>

${resultHTML}

</div>
`;
}

createPalette();
loadQuestion();
startTimer();

</script>

</body>
</html>
