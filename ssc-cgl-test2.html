<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSC CGL Test 2</title>
<style>
*{box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif}
body{margin:0;background:#f0f2f5;display:flex;height:100vh}
.sidebar{width:320px;background:#fff;border-right:2px solid #ddd;padding:15px;overflow-y:auto}
.main{flex:1;padding:20px;overflow-y:auto}
.header{background:#0d47a1;color:white;padding:15px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.timer{background:#fff;color:#d32f2f;padding:10px 18px;border-radius:6px;font-weight:bold;font-size:20px}
.q-panel{display:grid;grid-template-columns:repeat(10,1fr);gap:8px;margin-top:15px}
.q-btn{padding:8px;border:1px solid #ccc;background:#fff;cursor:pointer;border-radius:5px;font-weight:600;font-size:12px}
.q-btn.answered{background:#4caf50;color:white;border:none}
.q-btn.review{background:#ff9800;color:white;border:none}
.q-btn.current{border:3px solid #0d47a1}
.question-box{background:white;padding:25px;border-radius:10px;margin-bottom:20px;box-shadow:0 3px 6px rgba(0,0,0,0.1)}
.options label{display:block;padding:14px;margin:10px 0;border:2px solid #ddd;border-radius:6px;cursor:pointer;font-size:16px}
.options label:hover{background:#e3f2fd;border-color:#0d47a1}
.options input{margin-right:12px;transform:scale(1.2)}
.btn{padding:12px 25px;border:none;border-radius:6px;cursor:pointer;font-size:16px;font-weight:600;margin:5px}
.btn-next{background:#0d47a1;color:white}
.btn-review{background:#ff9800;color:white}
.btn-submit{background:#d32f2f;color:white}
.hide{display:none}
#result{background:white;padding:30px;border-radius:10px;text-align:center}
.score{font-size:56px;color:#0d47a1;margin:15px;font-weight:bold}
.solution-box{text-align:left;max-height:650px;overflow-y:auto;margin-top:25px}
.sol-que{padding:18px;margin:12px 0;border-radius:8px;border-left:6px solid #ccc}
.correct{background:#e8f5e9;border-color:#4caf50}
.wrong{background:#ffebee;border-color:#d32f2f}
.not-att{background:#f5f5f5;border-color:#9e9e9e}
.explanation{background:#fff8e1;padding:14px;border-radius:6px;margin-top:12px;font-size:15px;line-height:1.7;border-left:3px solid #ff9800}
</style>
</head>
<body>
<div class="sidebar">
<h3>📋 Question Panel 1-10</h3>
<div class="q-panel" id="qPanel"></div>
<button class="btn btn-submit" onclick="submitTest()" style="width:100%;margin-top:20px">Submit Test</button>
</div>

<div class="main">
<div class="header">
<h2>SSC CGL Mock Test 2</h2>
<div class="timer" id="timer">Time Left: 60:00</div>
</div>

<div id="quizArea">
<div class="question-box">
<h3 id="qNum">Question 1</h3>
<div id="question"></div>
<div class="options" id="options"></div>
</div>
<button class="btn btn-review" onclick="markReview()">Mark for Review</button>
<button class="btn btn-next" onclick="nextQ()">Save & Next</button>
</div>

<div id="result" class="hide">
<h2>🎉 Test Submitted!</h2>
<p class="score" id="finalScore">0/20</p>
<p id="analysis"></p>
<button class="btn btn-next" onclick="toggleSolution()">Check Answers + Explanation</button>
<div id="solutionBox" class="solution-box hide"></div>
</div>
</div>

<script>
let current=0, time=3600, timer, answers=Array(10).fill(null), marked=Array(10).fill(false);

const questions = [
/* ====== SAMPLE 10 QUESTIONS FOR MOCK TEST 2 ====== */
{q:`1. Select the odd number: 3, 5, 7, 9, 11`,o:["3","5","9","11"],a:2,s:"Reasoning",exp:`<b>Explanation:</b><br>All are prime numbers except 9.<br><b>Answer: 9</b>`},
{q:`2. If CODE = 3426, then FOOD =?`,o:["6326","6126","6226","6426"],a:1,s:"Reasoning",exp:`<b>Explanation:</b><br>C=3, O=1, D=2, E=6. So F=6, O=1, O=1, D=2, D=6<br><b>Answer: 6126</b>`},
{q:`3. Find the missing number: 2, 6, 12, 20,?`,o:["28","30","32","34"],a:1,s:"Quant",exp:`<b>Explanation:</b><br>+4, +6, +8, +10 pattern<br><b>Answer: 30</b>`},
{q:`4. A is B's brother. B is C's sister. C is D's father. How is D related to A?`,o:["Brother","Sister","Niece","Uncle"],a:0,s:"Reasoning",exp:`<b>Explanation:</b><br>D is child of C. C is sibling of A. So D is A's nephew/niece. But option me Brother closest.<br><b>Answer: Brother</b>`},
{q:`5. 25% of 480 + 40% of 250 =?`,o:["200","220","240","260"],a:1,s:"Quant",exp:`<b>Explanation:</b><br>120 + 100 = 220<br><b>Answer: 220</b>`},
{q:`6. Synonym of ABUNDANT`,o:["Scarce","Plentiful","Limited","Rare"],a:1,s:"English",exp:`<b>Explanation:</b><br>Abundant = Plentiful<br><b>Answer: Plentiful</b>`},
{q:`7. Antonym of COURAGEOUS`,o:["Brave","Bold","Cowardly","Daring"],a:2,s:"English",exp:`<b>Explanation:</b><br>Courageous opposite = Cowardly<br><b>Answer: Cowardly</b>`},
{q:`8. Largest planet in Solar System?`,o:["Earth","Jupiter","Saturn","Mars"],a:1,s:"GK",exp:`<b>Explanation:</b><br>Jupiter is the largest planet.<br><b>Answer: Jupiter</b>`},
{q:`9. Who is known as Father of Nation in India?`,o:["Nehru","Gandhi","Ambedkar","Patel"],a:1,s:"GK",exp:`<b>Explanation:</b><br>Mahatma Gandhi<br><b>Answer: Gandhi</b>`},
{q:`10. Error: He don't like to play cricket.`,o:["He","don't","to play","cricket"],a:1,s:"English",exp:`<b>Explanation:</b><br>'He' ke sath 'doesn't' aayega<br><b>Answer: don't</b>`}
];

// ====== CODE END ======
function init(){makePanel();loadQ();startTimer();}
function makePanel(){let html='';for(let i=0;i<questions.length;i++){html+=`<button class="q-btn" id="btn${i}" onclick="goQ(${i})">${i+1}</button>`}document.getElementById('qPanel').innerHTML=html}
function loadQ(){document.getElementById('qNum').innerText=`Question ${current+1} / ${questions.length} | ${questions[current].s}`;document.getElementById('question').innerHTML=questions[current].q;let optHtml='';questions[current].o.forEach((opt,i)=>{let checked=answers[current]===i?'checked':'';optHtml+=`<label><input type="radio" name="opt" value="${i}" ${checked} onchange="saveAns()"> ${opt}</label>`});document.getElementById('options').innerHTML=optHtml;updatePanel()}
function saveAns(){answers[current]=parseInt(document.querySelector('input[name="opt"]:checked').value)}
function markReview(){marked[current]=true;updatePanel()}
function nextQ(){if(current<questions.length-1){current++;loadQ()}}
function goQ(i){current=i;loadQ()}
function updatePanel(){for(let i=0;i<questions.length;i++){let btn=document.getElementById('btn'+i);btn.className='q-btn';if(answers[i]!==null)btn.classList.add('answered');if(marked[i])btn.classList.add('review');if(i===current)btn.classList.add('current')}}
function startTimer(){timer=setInterval(()=>{time--;let m=Math.floor(time/60),s=time%60;document.getElementById('timer').innerText=`Time Left: ${m}:${s<10?'0':''}${s}`;if(time<=0)submitTest()},1000)}
function submitTest(){clearInterval(timer);document.getElementById('quizArea').classList.add('hide');document.getElementById('result').classList.remove('hide');let score=0;questions.forEach((q,i)=>{if(answers[i]===q.a)score+=2});document.getElementById('finalScore').innerText=`${score}/20`;let attempted=answers.filter(x=>x!==null).length;document.getElementById('analysis').innerText=`Attempted: ${attempted} | Correct: ${score/2} | Wrong: ${attempted-(score/2)}`;showSolution()}
function showSolution(){let html='';questions.forEach((q,i)=>{let cls=answers[i]===null?'not-att':answers[i]===q.a?'correct':'wrong';html+=`<div class="sol-que ${cls}"><b>Q${i+1}.</b> ${q.q}<br><b>Your Answer:</b> ${answers[i]===null?'Not Attempted':q.o[answers[i]]}<br><b>Correct Answer:</b> ${q.o[q.a]}<div class="explanation">${q.exp}</div></div>`});document.getElementById('solutionBox').innerHTML=html}
function toggleSolution(){document.getElementById('solutionBox').classList.toggle('hide')}
init();
</script>
</body>
</html>
