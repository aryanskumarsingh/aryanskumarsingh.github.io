];

function init(){makePanel();loadQ();startTimer();}
function makePanel(){let html='';for(let i=0;i<questions.length;i++){html+=`<button class="q-btn" id="btn${i}" onclick="goQ(${i})">${i+1}</button>`}document.getElementById('qPanel').innerHTML=html}
function loadQ(){document.getElementById('qNum').innerText=`Question ${current+1} / ${questions.length} | ${questions[current].s}`;document.getElementById('question').innerHTML=questions[current].q;let opt='';for(let i=0;i<questions[current].o.length;i++){opt+=`<label><input type="radio" name="opt" value="${i}" onchange="saveAns()">${questions[current].o[i]}</label>`}document.getElementById('options').innerHTML=opt;if(answers[current]!==null){document.querySelector(`input[name="opt"][value="${answers[current]}"]`).checked=true}updatePanel()}
function saveAns(){answers[current]=parseInt(document.querySelector('input[name="opt"]:checked').value)}
function markReview(){marked[current]=true;updatePanel()}
function nextQ(){if(current<questions.length-1){current++;loadQ()}}
function goQ(i){current=i;loadQ()}
function updatePanel(){for(let i=0;i<questions.length;i++){let btn=document.getElementById('btn'+i);btn.className='q-btn';if(answers[i]!==null)btn.classList.add('answered');if(marked[i])btn.classList.add('review');if(i===current)btn.classList.add('current')}}
function startTimer(){timer=setInterval(()=>{time--;let m=Math.floor(time/60),s=time%60;document.getElementById('timer').innerText=`Time Left: ${m}:${s<10?'0':''}${s}`;if(time<=0)submitTest()},1000)}
function submitTest(){clearInterval(timer);document.getElementById('quizArea').classList.add('hide');document.getElementById('result').classList.remove('hide');let score=0;questions.forEach((q,i)=>{if(answers[i]===q.a)score++});document.getElementById('finalScore').innerText=`${score}/100`;document.getElementById('analysis').innerText=`Correct: ${score} | Wrong: ${100-score} | Accuracy: ${(score).toFixed(1)}%`;showSolution()}
function showSolution(){let html='';questions.forEach((q,i)=>{let cls=answers[i]===null?'not-att':answers[i]===q.a?'correct':'wrong';html+=`<div class="sol-que ${cls}"><b>Q${i+1}.</b> ${q.q}<br><b>Your Answer:</b> ${answers[i]===null?'Not Attempted':q.o[answers[i]]}<br><b>Correct Answer:</b> ${q.o[q.a]}<div class="explanation">${q.exp}</div></div>`});document.getElementById('solutionBox').innerHTML=html;document.getElementById('solutionBox').classList.remove('hide')}
function toggleSolution(){document.getElementById('solutionBox').classList.toggle('hide')}
init();
</script>
