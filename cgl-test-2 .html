<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSC CGL Mock Test 2</title>
<body>

<div class="container">
    <h2>SSC CGL Mock Test 2</h2>

    <a href="cgl-test-2.html" class="btn">
        Start Mock Test 2
    </a>
</div>

</body>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}
.container{
    max-width:700px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}
h2{
    text-align:center;
}
.timer{
    background:#ff9800;
    color:#fff;
    text-align:center;
    padding:10px;
    font-size:20px;
    border-radius:5px;
    margin-bottom:20px;
}
.question{
    font-size:20px;
    margin-bottom:15px;
}
.option{
    display:block;
    background:#eee;
    padding:10px;
    margin:8px 0;
    border-radius:5px;
    cursor:pointer;
}
.option:hover{
    background:#ddd;
}
button{
    width:100%;
    padding:12px;
    background:#2196F3;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}
button:hover{
    background:#1976D2;
}
#result{
    margin-top:20px;
    font-size:22px;
    text-align:center;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>SSC CGL Mock Test 2</h2>

<div class="timer">
Time Left:
<span id="time">10:00</span>
</div>

<div class="question">
1. What is the capital of India?
</div>

<label class="option">
<input type="radio" name="q1" value="0">
Mumbai
</label>

<label class="option">
<input type="radio" name="q1" value="1">
New Delhi
</label>

<label class="option">
<input type="radio" name="q1" value="2">
Kolkata
</label>

<label class="option">
<input type="radio" name="q1" value="3">
Chennai
</label>

<br>

<button onclick="submitTest()">Submit Test</button>

<div id="result"></div>

</div>

<script>

let time=600;

let timer=setInterval(function(){

let min=Math.floor(time/60);

let sec=time%60;

document.getElementById("time").innerHTML=
min+":"+(sec<10?"0":"")+sec;

time--;

if(time<0){
clearInterval(timer);
submitTest();
}

},1000);

function submitTest(){

clearInterval(timer);

let answer=document.querySelector('input[name="q1"]:checked');

let score=0;

if(answer && answer.value=="1"){
score=1;
}

document.getElementById("result").innerHTML=
"Your Score: "+score+"/1";

}

</script>

</body>
</html>
