<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSC CGL</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fc;
margin:0;
}

header{
background:#0d47a1;
color:white;
padding:30px;
text-align:center;
}

.container{
max-width:1000px;
margin:auto;
padding:30px 20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:white;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.btn{
display:inline-block;
background:#0d47a1;
color:white;
padding:10px 20px;
text-decoration:none;
border-radius:6px;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<h1>SSC CGL</h1>
<p>Notes & Test Series</p>
</header>

<div class="container">

<div class="cards">

<div class="card">
<h2>📚 PDF Notes</h2>
<p>Download SSC CGL Notes</p>
<a href="#" class="btn">Open Notes</a>
</div>

<div class="card">
<h2>📝 Mock Tests</h2>
<p>Practice SSC CGL Tests</p>
<a href="#" class="btn">Start Test</a>
</div>

</div>

</div>

</body>
</html>
