<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPSC Mains</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fc;
margin:0;
}

header{
background:#0d47a1;
color:white;
text-align:center;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
padding:30px 20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:white;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h2{
color:#0d47a1;
}

.btn{
display:inline-block;
background:#0d47a1;
color:white;
padding:10px 20px;
text-decoration:none;
border-radius:6px;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<h1>📗 BPSC Mains</h1>
<p>PDF Notes & Mock Tests</p>
</header>

<div class="container">

<div class="cards">

<div class="card">
<h2>📚 PDF Notes</h2>
<p>Download BPSC Mains Notes</p>
<a href="bpsc-mains-notes.html" class="btn">Open Notes</a>
</div>

<div class="card">
<h2>📝 Mock Tests</h2>
<p>Practice BPSC Mains Mock Tests</p>
<a href="bpsc-mains-tests.html" class="btn">Start Test</a>
</div>

</div>

</div>

</body>
</html>
