<!DOCTYPE html>
<html>
<head>
<title>SSC CGL Test 1</title>
<style>
body{
font-family:Arial,sans-serif;
padding:20px;
background:#f4f7fc;
}

.question{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

button{
background:#0d47a1;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
}

#result{
font-size:22px;
font-weight:bold;
margin-top:20px;
}
</style>
</head>
<body>

<h1>SSC CGL Mock Test</h1>

<form id="quiz">

<div class="question">
<p>1. What is the capital of India?</p>
<input type="radio" name="q1" value="0"> Mumbai<br>
<input type="radio" name="q1" value="1"> New Delhi<br>
<input type="radio" name="q1" value="0"> Kolkata<br>
<input type="radio" name="q1" value="0"> Chennai<br>
</div>

<div class="question">
<p>2. 5 + 7 = ?</p>
<input type="radio" name="q2" value="0"> 10<br>
<input type="radio" name="q2" value="1"> 12<br>
<input type="radio" name="q2" value="0"> 14<br>
<input type="radio" name="q2" value="0"> 15<br>
</div>

<div class="question">
<p>3. Who wrote the Constitution of India?</p>
<input type="radio" name="q3" value="0"> Gandhi<br>
<input type="radio" name="q3" value="1"> Dr. B. R. Ambedkar<br>
<input type="radio" name="q3" value="0"> Nehru<br>
<input type="radio" name="q3" value="0"> Patel<br>
</div>

<button type="button" onclick="checkScore()">Submit Test</button>

</form>

<div id="result"></div>

<script>
function checkScore() {

let score = 0;

let answers = document.querySelectorAll('input[type="radio"]:checked');

answers.forEach(answer => {
score += Number(answer.value);
});

document.getElementById("result").innerHTML =
"Your Score: " + score + "/3";

}
</script>

</body>
</html>
