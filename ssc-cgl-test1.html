<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSC CGL Mock Test 1</title>
<style>
body{font-family:Arial,sans-serif;max-width:900px;margin:auto;padding:20px}
.timer{position:sticky;top:0;background:#ffd54f;padding:10px;font-weight:bold}
.question{border:1px solid #ddd;padding:10px;margin:10px 0}
.correct{background:#b7ffb7}
.wrong{background:#ffb7b7}
button{padding:10px 20px;font-size:16px}
</style>
</head>
<body>
<div class="timer">⏳ Time Left: <span id="timer">90:00</span></div>
<h1>SSC CGL Mock Test 1</h1>

<form id="quiz">
<div id="questions"></div>
<button type="button" onclick="checkScore()">Submit Test</button>
</form>

<div id="result"></div>

<script>
const questions=[
["What is the capital of Rajasthan?",["Jaipur","Jodhpur","Udaipur","Kota"],0],
["25 × 12 = ?",["250","300","350","275"],1],
["Red Planet?",["Venus","Mars","Jupiter","Saturn"],1],
["144 ÷ 12 = ?",["10","11","12","14"],2],
["Who wrote Discovery of India?",["Gandhi","Nehru","Patel","Ambedkar"],1],
["Largest ocean?",["Atlantic","Indian","Pacific","Arctic"],2],
["18² = ?",["324","342","314","334"],0],
["Synonym of Brave?",["Coward","Fearful","Courageous","Weak"],2],
["Article for Equality?",["14","19","21","32"],0],
["HCF of 24 and 36?",["6","12","18","24"],1],
["Father of Nation?",["Nehru","Gandhi","Patel","Bose"],1],
["15% of 200?",["25","30","35","40"],1],
["Most abundant gas?",["Oxygen","Nitrogen","CO2","Hydrogen"],1],
["Antonym of Ancient?",["Old","Modern","Historic","Traditional"],1],
["Currency of Japan?",["Yuan","Won","Yen","Ringgit"],2],
["7×8+12?",["68","64","72","74"],0],
["Sorrow of Bihar river?",["Ganga","Kosi","Son","Gandak"],1],
["CPU stands for?",["Central Processing Unit","Central Power Unit","Computer Processing Unit","Control Processing Unit"],0],
["If TRAIN=USBJO, BOOK=?",["CPPL","CPOK","BNNL","DQQM"],0],
["First President of India?",["Rajendra Prasad","Nehru","Radhakrishnan","Ambedkar"],0]
];

const qDiv=document.getElementById("questions");
questions.forEach((q,i)=>{
 let html=<div class="question" data-answer="${q[2]}"><p>${i+1}. ${q[0]}</p>;
 q[1].forEach((o,j)=>{
  html+=<label><input type="radio" name="q${i}" value="${j}"> ${o}</label><br>;
 });
 html+="</div>";
 qDiv.innerHTML+=html;
});

let timeLeft=5400;
const timer=setInterval(()=>{
 let m=Math.floor(timeLeft/60), s=timeLeft%60;
 document.getElementById("timer").textContent=m+":"+(s<10?"0":"")+s;
 timeLeft--;
 if(timeLeft<0){clearInterval(timer);checkScore();}
},1000);

function checkScore(){
 clearInterval(timer);
 let correct=0,wrong=0,attempted=0;
 document.querySelectorAll('.question').forEach(q=>{
  let ans=q.dataset.answer;
  let sel=q.querySelector('input:checked');
  q.querySelectorAll('label').forEach(l=>{
   let inp=l.querySelector('input');
   if(inp.value===ans) l.classList.add('correct');
   if(sel && inp.value===sel.value && sel.value!==ans) l.classList.add('wrong');
  });
  if(sel){attempted++; if(sel.value===ans) correct++; else wrong++;}
 });
 document.getElementById('result').innerHTML=
 <h2>Result</h2>
 <p>Total: ${questions.length}</p>
 <p>Attempted: ${attempted}</p>
 <p>Correct: ${correct}</p>
 <p>Wrong: ${wrong}</p>
 <p>Percentage: ${(correct/questions.length*100).toFixed(2)}%</p>;
}
</script>
</body>
</html>
