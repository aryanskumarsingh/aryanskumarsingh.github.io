<body>

<h1>SSC CGL Mock Test</h1>

<div id="timer">05:00</div>

<input type="radio" name="q1"> Patna<br>
<input type="radio" name="q1"> Delhi<br>
<input type="radio" name="q1"> Ranchi<br>
<input type="radio" name="q1"> Lucknow<br>

<script>

let time = 300;

setInterval(function(){

let minutes = Math.floor(time/60);
let seconds = time%60;

document.getElementById("timer").innerHTML =
minutes + ":" + (seconds<10?"0":"") + seconds;

time--;

},1000);

</script>
