<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SSC CGL Mock Test</title>

<style>
body{font-family:Arial;margin:0;background:#eef2f7}

.topbar{
background:#1e3a8a;color:white;
padding:12px;
display:flex;
justify-content:space-between;
}

.container{display:flex;max-width:1000px;margin:auto}

.main{flex:3;background:white;padding:20px}

.question{font-size:20px;margin-bottom:15px}

.option{
padding:10px;
border:1px solid #ccc;
margin:8px 0;
cursor:pointer;
}

.option:hover{background:#f1f1f1}

.selected{background:#c8e6c9}

.sidebar{flex:1;background:white;padding:10px}

.qbtn{
display:inline-block;
padding:8px;
margin:3px;
border:1px solid #333;
cursor:pointer;
}

.answered{background:green;color:white}
.notanswered{background:red;color:white}
</style>

</head>

<body>

<div class="topbar">
<div>SSC CGL Mock Test</div>
<div id="timer">Time: 15:00</div>
</div>

<div class="container">

<div class="main">
<div class="question" id="question">Loading question...</div>
<div id="options"></div>

<button onclick="prevQ()">Previous</button>
<button onclick="nextQ()">Next</button>
<button onclick="submitTest()">Submit</button>
</div>

<div class="sidebar">
<h3>Questions</h3>
<div id="palette"></div>
</div>

</div>

<script>

const questions = [
{q:"Capital of India?",options:["Mumbai","Delhi","Kolkata","Chennai"],answer:1},
{q:"2 + 2 × 2 = ?",options:["6","8","4","10"],answer:0},
{q:"SSC full form?",options:["Staff Selection Commission","State Service Commission","Student Center","None"],answer:0}
];

let current = 0;
let answers = Array(questions.length).fill(null);
let time = 900;

/* ================= INIT SAFE ================= */
window.onload = function(){
    showQuestion();
    updatePalette();
    startTimer();
};

/* ================= TIMER ================= */
function startTimer(){
    setInterval(()=>{
        let m = Math.floor(time/60);
        let s = time%60;

        document.getElementById("timer").innerText =
        "Time: " + m + ":" + (s<10?"0"+s:s);

        time--;

        if(time < 0){
            submitTest();
        }
    },1000);
}

/* ================= SHOW QUESTION ================= */
function showQuestion(){

    let q = questions[current];

    document.getElementById("question").innerText = q.q;

    let html = "";

    q.options.forEach((opt,i)=>{
        let sel = answers[current] === i ? "selected" : "";

        html += <div class="option ${sel}" onclick="selectOption(${i})">${opt}</div>;
    });

    document.getElementById("options").innerHTML = html;

    updatePalette();
}

/* ================= SELECT OPTION ================= */
function selectOption(i){
    answers[current] = i;
    showQuestion();
}

/* ================= NAVIGATION ================= */
function nextQ(){
    if(current < questions.length-1){
        current++;
        showQuestion();
    }
}

function prevQ(){
    if(current > 0){
        current--;
        showQuestion();
    }
}

/* ================= PALETTE ================= */
function updatePalette(){

    let html = "";

    questions.forEach((q,i)=>{

        let cls = answers[i] !== null ? "qbtn answered" : "qbtn notanswered";

        html += <div class="${cls}" onclick="goTo(${i})">${i+1}</div>;
    });

    document.getElementById("palette").innerHTML = html;
}

function goTo(i){
    current = i;
    showQuestion();
}

/* ================= SUBMIT ================= */
function submitTest(){

    let score = 0;

    questions.forEach((q,i)=>{
        if(answers[i] === q.answer){
            score++;
        }
    });

    document.body.innerHTML =
    <h2 style="text-align:center;margin-top:50px">
        Your Score: ${score}/${questions.length}
    </h2>;
}

</script>

</body>
</html>
