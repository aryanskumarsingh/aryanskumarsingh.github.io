{q:`<div class="section-head">QUANTITATIVE APTITUDE</div>26. The simple interest on an amount for 6 years at 4% p.a. is ₹7,500 less than the simple interest on the same amount for 11 years. Find the amount.<br>(a) ₹38,000 (b) ₹37,500 (c) ₹37,000 (d) ₹38,500`,o:["₹38,000","₹37,500","₹37,000","₹38,500"],a:1,s:"Quant",exp:`<b>Explanation:</b><br>SI for 5 years = 7500. So SI for 1 year = 1500. P = 1500*100/4 = 37500<br><b>Answer: ₹37,500</b>`},
{q:`27. A laptop is sold for ₹54,000 after giving a discount of 20%. What is the list price of the laptop?<br>(a) 69500 (b) 67500 (c) 70000 (d) 64800`,o:["69500","67500","70000","64800"],a:1,s:"Quant",exp:`<b>Explanation:</b><br>List Price = 54000*100/80 = 67500<br><b>Answer: 67500</b>`},
{q:`28. If x² - 1/x² = 42, what is the value of x⁴ - 1/x⁴ ?<br>(a) 16√2 (b) 82 (c) 24√2 (d) 32√2`,o:["16√2","82","24√2","32√2"],a:1,s:"Quant",exp:`<b>Explanation:</b><br>(x²-1/x²)² = x⁴+1/x⁴-2 = 1764. So x⁴+1/x⁴=1766. x⁴-1/x⁴ = √[(1766)²-4] = 82<br><b>Answer: 82</b>`},
{q:`29. P, Q and R can complete a piece of work in 9, 12 and 18 days, respectively. Working together, how much work can they complete in one day?<br>(a) 2/3 (b) 1/2 (c) 1/3 (d) 1/4`,o:["2/3","1/2","1/3","1/4"],a:3,s:"Quant",exp:`<b>Explanation:</b><br>1/9 + 1/12 + 1/18 = 4+3+2/36 = 9/36 = 1/4<br><b>Answer: 1/4</b>`},
{q:`30. Ram and Ramesh can do a work in 12 days, Ramesh and Somesh in 15 days and Somesh and Ram in 10 days. If Ram, Ramesh and Somesh work together, in how many days will they complete the work?<br>(a) 10 (b) 8 (c) 12 (d) 6`,o:["10","8","12","6"],a:1,s:"Quant",exp:`<b>Explanation:</b><br>2(R+S+R) = 1/12+1/15+1/10 = 1/4. So R+S+R = 1/8. 8 days<br><b>Answer: 8</b>`},
{q:`31. A certain distance is covered by a person at a certain speed. If another person covers 25% of the distance in triple the time, the ratio of the speed of the first person to that of the second person is:<br>(a) 1:6 (b) 1:12 (c) 6:1 (d) 12:1`,o:["1:6","1:12","6:1","12:1"],a:3,s:"Quant",exp:`<b>Explanation:</b><br>S1 = D/T, S2 = 0.25D/3T = D/12T. Ratio = 12:1<br><b>Answer: 12:1</b>`},
{q:`32. A dishonest dealer sells articles at 15% loss on cost price but uses the weight of 20g instead of 25g. What is his profit or loss percentage?<br>(a) 6.25% Profit (b) 6.50% Profit (c) 7.55% Loss (d) 5.25% Loss`,o:["6.25% Profit","6.50% Profit","7.55% Loss","5.25% Loss"],a:0,s:"Quant",exp:`<b>Explanation:</b><br>CP of 25g=100, SP=85, but he gives only 20g. Effective SP for 25g = 85*25/20=106.25. Profit=6.25%<br><b>Answer: 6.25% Profit</b>`},
{q:`33. A one metre pipe is made with inner diameter equal to outer radius. How much material is required to make the pipe, if it can hold 88/7 cubic metres water in it?<br>(a) 37.7 (b) 35.5 (c) 33.3 (d) 36.6`,o:["37.7","35.5","33.3","36.6"],a:0,s:"Quant",exp:`<b>Explanation:</b><br>πr²h=88/7, r=2, R=4. Material = π(R²-r²)h = 22/7*12*1=37.7<br><b>Answer: 37.7</b>`},
{q:`34. What is the difference between the number of employees of Department E and Department C?<br>(a) 50 (b) 250 (c) 150 (d) 200`,o:["50","250","150","200"],a:1,s:"Quant",exp:`<b>Explanation:</b><br>300-50=250<br><b>Answer: 250</b>`},

{q:`44. A thief robs precious metals from a store which is 1150 m away from the police. The thief starts running at 6 km/h and the police starts chasing at 11 km/h at the same time. How much distance will the thief run before being caught?<br>(a) 1485 (b) 1380 (c) 1125 (d) 1280`,o:["1485","1380","1125","1280"],a:1,s:"Quant",exp:`<b>Explanation:</b><br>Relative speed=5km/h. Time=1150/1388.89h. Distance=6*1000*1150/1388.89=1380m<br><b>Answer: 1380</b>`},
{q:`45. The value of 35/47 + 33/77 ÷ 11/22 × 7/7 = ?<br>(a) 11 1/28 (b) 13 2/28 (c) 13 3/28 (d) 23 4/28`,o:["11 1/28","13 2/28","13 3/28","23 4/28"],a:2,s:"Quant",exp:`<b>Explanation:</b><br>35/47 + 33/77*22/11*1 = 35/47 + 6/7 = 13 3/28<br><b>Answer: 13 3/28</b>`},
{q:`46. If the third proportional of 3x² and 4xy is 48, then find the positive value of y.<br>(a) 3 (b) 5 (c) 2 (d) 4`,o:["3","5","2","4"],a:0,s:"Quant",exp:`<b>Explanation:</b><br>b²/ac=48. (4xy)²/3x²*48=1. 16y²/144=1. y=3<br><b>Answer: 3</b>`},
{q:`47. The distance between centres of two circles having radii 22 cm and 18 cm, is 32cm. The length of direct common tangent is:<br>(a) 2√252 cm (b) 2√152 cm (c) 3√242 cm (d) 3√252 cm`,o:["2√252 cm","2√152 cm","3√242 cm","3√252 cm"],a:0,s:"Quant",exp:`<b>Explanation:</b><br>L=√[d²-(R-r)²]=√[1024-16]=√1008=2√252<br><b>Answer: 2√252 cm</b>`},

{q:`49. The length of a hall is 21m and width 14m. Sum of areas of floor and roof equals sum of areas of four walls. Find height.<br>(a) 8.4m (b) 8.2m (c) 8.6m (d) 8.8m`,o:["8.4m","8.2m","8.6m","8.8m"],a:0,s:"Quant",exp:`<b>Explanation:</b><br>2lb=2h(l+b). 21*14=h*35. h=8.4m<br><b>Answer: 8.4m</b>`},

function init(){
  makePanel();
  loadQ();
  startTimer();
}

function makePanel(){
  let html = '';
  for(let i = 0; i < questions.length; i++){
    html += `<button class="q-btn" id="btn${i}" onclick="goQ(${i})">${i+1}</button>`;
  }
  document.getElementById('qPanel').innerHTML = html;
}

function loadQ(){
  document.getElementById('qNum').innerText = `Question ${current+1} / ${questions.length} | ${questions[current].s}`;
  document.getElementById('question').innerHTML = questions[current].q;
  
  let optHtml = '';
  questions[current].o.forEach((opt, i) => {
    let checked = answers[current] === i ? 'checked' : '';
    optHtml += `<label><input type="radio" name="opt" value="${i}" ${checked} onchange="saveAns()"> ${opt}</label>`;
  });
  document.getElementById('options').innerHTML = optHtml;
  updatePanel();
}

function saveAns(){
  let selected = document.querySelector('input[name="opt"]:checked');
  if(selected){
    answers[current] = parseInt(selected.value);
  }
  updatePanel();
}

function markReview(){
  marked[current] = !marked[current];
  updatePanel();
}

function nextQ(){
  if(current < questions.length - 1){
    current++;
    loadQ();
  }
}

function goQ(i){
  current = i;
  loadQ();
}

function updatePanel(){
  for(let i = 0; i < questions.length; i++){
    let btn = document.getElementById('btn' + i);
    btn.className = 'q-btn';
    if(i === current) btn.classList.add('current');
    if(marked[i]) btn.classList.add('review');
    else if(answers[i] !== null) btn.classList.add('answered');
    else btn.classList.add('not-visited');
  }
}

function startTimer(){
  timer = setInterval(() => {
    time--;
    let m = Math.floor(time / 60), s = time % 60;
    document.getElementById('timer').innerText = `Time Left: ${m}:${s < 10 ? '0' : ''}${s}`;
    if(time <= 0) {
      clearInterval(timer);
      submitTest();
    }
  }, 1000);
}

function submitTest(){
  clearInterval(timer);
  document.getElementById('quizArea').classList.add('hide');
  document.getElementById('result').classList.remove('hide');
  
  let score = 0, correct = 0, wrong = 0, unattempted = 0;
  let secScore = {GK: 0, Quant: 0, Reasoning: 0, English: 0};
  let solHTML = '';
  
  questions.forEach((q, i) => {
    if(answers[i] === null){
      unattempted++;
      solHTML += `<div class="sol-que not-att"><b>Q${i+1}.</b> ${q.q}<br><b>Not Attempted</b> | Correct: ${q.o[q.a]}</div>`;
    } else if(answers[i] === q.a){
      score += 2;
      correct++;
      secScore[q.s] += 2;
      solHTML += `<div class="sol-que correct"><b>Q${i+1}.</b> ${q.q}<br>Your: ${q.o[answers[i]]} ✔️ | Correct: ${q.o[q.a]}</div>`;
    } else {
      score -= 0.5;
      wrong++;
      secScore[q.s] -= 0.5;
      solHTML += `<div class="sol-que wrong"><b>Q${i+1}.</b> ${q.q}<br>Your: ${q.o[answers[i]]} ❌ | Correct: ${q.o[q.a]}</div>`;
    }
  });
  
  let percentage = ((score / 200) * 100).toFixed(2);
  document.getElementById('finalScore').innerText = `${score}/200`;
  document.getElementById('analysis').innerHTML = `Correct: ${correct} | Wrong: ${wrong} | Unattempted: ${unattempted} | <b>Percentage: ${percentage}%</b>`;
  document.getElementById('sectionScore').innerHTML = `GK: ${secScore.GK}/50 | Quant: ${secScore.Quant}/50 | Reasoning: ${secScore.Reasoning}/50 | English: ${secScore.English}/50`;
  document.getElementById('solutionBox').innerHTML = solHTML;
}

function toggleSolution(){
  document.getElementById('solutionBox').classList.toggle('hide');
}

init();
</script>
