let current=0, answers=Array(150).fill(null), review=Array(150).fill(false);
let timeLeft = 120 * 60, timerInterval;

function startTimer(){
  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    if(timeLeft <= 0){ clearInterval(timerInterval); alert("Time Up!"); submitTest(); return; }
    timeLeft--;
    let min = Math.floor(timeLeft / 60), sec = timeLeft % 60;
    document.getElementById('timer').innerText = `Time Left: ${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
    if(timeLeft < 300) document.getElementById('timer').style.color = '#d32f2f';
  },1000);
}

const qPanel=document.getElementById('qPanel');
for(let i=0;i<150;i++){
  let btn=document.createElement('button');
  btn.className='q-btn not-visited';
  btn.innerText=i+1;
  btn.onclick=()=>jumpQ(i);
  qPanel.appendChild(btn);
}

function loadQ(){
  document.getElementById('qNum').innerText=`Question ${current+1} | ${questions[current].s}`;
  document.getElementById('question').innerText=questions[current].q;
  let optHtml='';
  questions[current].o.forEach((opt,i)=>{
    let checked=answers[current]===i?'checked':'';
    optHtml+=`<label><input type="radio" name="opt" value="${i}" ${checked} onchange="saveAns()"> ${opt}</label>`;
  });
  document.getElementById('options').innerHTML=optHtml;
  updatePanel();
}

function saveAns(){let s=document.querySelector('input[name="opt"]:checked');if(s)answers[current]=parseInt(s.value);updatePanel();}
function nextQ(){saveAns();if(current<150){current++;loadQ()}}
function jumpQ(i){saveAns();current=i;loadQ()}
function markReview(){review[current]=!review[current];updatePanel()}

function updatePanel(){
  document.querySelectorAll('.q-btn').forEach((btn,i)=>{
    btn.className='q-btn';
    if(i===current)btn.classList.add('current');
    if(review[i])btn.classList.add('review');
    else if(answers[i]!==null)btn.classList.add('answered');
    else btn.classList.add('not-visited');
  });
}

function submitTest(){
  clearInterval(timerInterval);
  if(!confirm("Submit test?"))return;
  saveAns();
  let score=0, correct=0, wrong=0, unattempted=0;
  let secScore={};
  let solHTML='';

  questions.forEach((q,i)=>{
    let u=answers[i], c=q.a;
    if(!secScore[q.s]) secScore[q.s] = {correct: 0, wrong: 0};
    
    if(u===null){
      unattempted++; 
      solHTML+=`<div class="sol-que not-att"><b>Q${i+1}.</b> ${q.q}<br><b>Not Attempted</b> | Correct: ${q.o[c]}</div>`;
    }
    else if(u===c){
      score+=1;
      correct++;
      secScore[q.s].correct+=1;
      solHTML+=`<div class="sol-que correct"><b>Q${i+1}.</b> ${q.q}<br>Your: ${q.o[u]} ✔️ | Correct: ${q.o[c]}</div>`;
    }
    else{
      score-=(1/3);
      wrong++;
      secScore[q.s].wrong+=(1/3);
      solHTML+=`<div class="sol-que wrong"><b>Q${i+1}.</b> ${q.q}<br>Your: ${q.o[u]} ❌ | Correct: ${q.o[c]}</div>`;
    }
  });

  let percentage=((score/150)*100).toFixed(1);
  document.getElementById('quizArea').classList.add('hide');
  document.getElementById('result').classList.remove('hide');
  document.getElementById('finalScore').innerText=`${score.toFixed(2)}/150`;
  document.getElementById('analysis').innerHTML=`Correct: ${correct} | Wrong: ${wrong} | Unattempted: ${unattempted} | <b>Percentage: ${percentage}%</b>`;
  
  let sectionHTML = '';
  Object.keys(secScore).forEach(section => {
    sectionHTML += `<b>${section}</b>: ${secScore[section].correct} correct, ${secScore[section].wrong.toFixed(2)} negative | `;
  });
  document.getElementById('sectionScore').innerHTML=sectionHTML;
  document.getElementById('solutionBox').innerHTML=solHTML;
}

function toggleSolution(){
  document.getElementById('solutionBox').classList.toggle('hide');
}

loadQ();
startTimer();
</script>
